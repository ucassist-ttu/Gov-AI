<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC Assist</title>
    <link rel="icon" type="image" href="../../assets/images/cropped-Seal_JPEG-32x32.jpg">
    <!-- bootstrap library and custom css link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="white">
    <div id="navbar" data-name="Navigation Bar"></div>
    <main data-name="Service Details Main Content">
        <div class="d-flex dark_navy p-4" data-name="Service Details Header">
            <h1 class="ps-md-4 fw-bold white" data-name="Page Title">Find Services</h1>
        </div>
        <div id="divService" data-name="Service Information Container">
        </div>
    </main>

    <div id="footer" data-name="Page Footer"></div>

    <script>
        fetch('../../partials/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);
        fetch('../../partials/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);
    </script>
    <!-- more bootsrap libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/js/api.js"></script>
    <script src="../../js/service.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/navbar.js"></script>
    <script src="../../js/analytics.js"></script>
</body>
</html>
