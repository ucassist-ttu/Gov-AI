<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC Assist</title>
    <link rel="icon" type="image" href="../../assets/images/cropped-Seal_JPEG-32x32.jpg">
    <!-- bootstrap library and custom css link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body class="white">
    <div id="navbar" data-name="Navigation Bar"></div>
    <main data-name="Services Search Main Content">
        <div id="overlay" data-name="Search Overlay"></div>
        <div class="d-flex dark_navy p-4" data-name="Page Header Bar">
            <h1 class="ps-md-4 fw-bold white" data-name="Page Title">Find Services</h1>               
             <nav aria-label="breadcrumb" class="position-absolute top-0 end-0 me-3 mt-2 breadcrumb-top-right" data-name="Navigation Breadcrumb">
                <ol class="breadcrumb mb-0" data-name="Breadcrumb Links">
                   <li class="breadcrumb-item fs-6" data-name="Breadcrumb Home Item"><a href="/index.html" class="text-white" data-name="Breadcrumb Home Link">Home</a></li>
                   <li class="text-white mx-2 fs-6" data-name="Breadcrumb Separator">›</li>                 
                   <li class="breadcrumb-item active text-white fs-6" aria-current="page" data-name="Current Page in Breadcrumb">Find Services</li>
                </ol>
                </nav> 

        </div>
        <div id="mySidenav" class="sidenav" data-name="Filter and Sort Sidebar">
            <h3 data-name="Filter and Sort Title">Filter & Sort</h3>
            <a href="javascript:void(0)" class="closebtn" onclick="closeNav()" data-name="Close Sidebar Button">&times;</a>
            <hr />
            <div id="divAllFilter" class="sidenav-scroll form-check" data-name="Filter Options Container">
                <div class="stickytitle" data-name="Counties Filter Section Heading">
                    <a id="btnCounties" data-name="Counties Filter Toggle">Counties <i class="bi bi-caret-down-fill"></i></a>
                    <hr />
                </div>
                <div id="divOuterCounties" class="form-check outer-layer" style="display: none;" data-name="Counties Filter Options Container">
                    <div id="divCounties" class="form-check" data-name="Counties Filter List">
                    </div>
                    <div id="divMoreCounties" style="display:none" data-name="Overflow Counties Section">
                    </div>
                    <button id="btnShowMoreCounties" class="btn btn-link" data-name="Show More Counties Button"></button>
                </div>
                <div class="stickytitle" data-name="Service Type Filter Section Heading">
                    <a id="btnServiceType" data-name="Service Type Filter Toggle">Service Type <i class="bi bi-caret-down-fill"></i></a>
                    <hr />
                </div>
                <div id="divOuterServiceTypes" class="form-check outer-layer" style="display: none;" data-name="Service Types Filter Options Container">
                    <div id="divServiceType" class="form-check" data-name="Service Types Filter List">
                    </div>
                    <div id="divMoreServiceTypes" style="display:none" data-name="Overflow Service Types Section">
                    </div>
                    <button id="btnShowMoreServices" class="btn btn-link" data-name="Show More Services Button"></button>
                </div>
            </div>
            <div class="sidenav-footer" data-name="Filter and Sort Sidebar Footer">
                <hr />
                <button id="btnClearFilter" class="btn btn-secondary col-5" data-name="Clear All Filters Button">Clear Filters</button>
                <button id="btnSeeResults" class="btn btn-primary col-5" data-name="Apply Filters Button">See Results</button>
            </div>
        </div>
        <div id="carouselExampleControls" class="carousel slide carousel-fade" data-bs-ride="carousel" data-name="Services Banner Carousel">
            <div class="carousel-inner" data-name="Carousel Content Container">
                <div class="carousel-item active" data-name="Carousel Slide">
                    <img src="../../assets/images/error-rodney-truitt-jf.png" class="background_filter_image z-0" alt="..." data-name="Carousel Background Image">
                    <div class="carousel-caption d-flex flex-column align-items-center justify-content-center h-100 col-11 col-md-9 col-lg-7 mx-auto start-0 end-0" data-name="Carousel Search Section">
                        <!-- search bar -->
                        <div class="ai-search-bar mt-md-3 mt-lg-5 d-flex align-items-center" data-name="Service Search Bar">
                            <i class="bi bi-search ps-2" data-name="Search Icon"></i>
                            <div class="divider-vertical d-flex align-items-center" data-name="Search Bar Divider"></div>
                            <input id="txtSearchServices" class="form-control flex-grow-1 border-0 shadow-none p-0 w-100 align-self-center search-input fst-italic" type="text" placeholder="I am looking for..." aria-label="What are you looking for?" data-name="Service Search Input">
                            <!-- submit button -->
                            <div class="d-flex justify-content-between" data-name="Search Button Container">
                                <button id="btnSearchServices" class="btn search-btn fs-3" aria-label="Search" data-name="Service Search Button"><i class="bi bi-arrow-right-circle-fill mt-2"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
                
        <div id="divServiceMain" data-name="Services Results Section"> 
        <div class="row align-items-center mt-3" data-name="Filter Control Row">
            <div id="divFilterButtons" class="filter" data-name="Filter Control Buttons">
                <button id="btnFilterSort" data-name="Filter and Sort Button">Filter & Sort <i class="bi bi-sliders"></i></button>
                <button id="btnLearnServices" class="btn btn-link" style="border: none; font-size: 25px;" data-name="Service Information Button"><i class="bi bi-question-circle"></i></button>
            </div>
        </div>
        <div id="divServices" class="mb-3" data-name="Service Results List"></div>
        </div>
    </main>

    <div id="footer" data-name="Page Footer"></div>

    <script>
        fetch('../../partials/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);
        fetch('../../partials/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);
    </script>
    <!-- more bootsrap libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/js/api.js"></script>
    <script src="../../js/services.js"></script>
    <script  src="../../js/navbar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/analytics.js"></script>
</body>
</html>
