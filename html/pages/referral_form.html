<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
  <title>Service Referral Form</title>
  <link rel="icon" type="image" href="/assets/images/cropped-Seal_JPEG-32x32.jpg">
</head>

<body class="white">
    <div id="navbar"></div>
      <div id="carouselExampleControls" class="carousel slide carousel-fade" data-bs-ride="carousel">
            <div class="position-relative overflow-hidden" style="max-height: 350px;">
                <div class="carousel-item active">
                    <img src="..\..\assets\images\referral-form.png" class="w-100 h-100 object-fit-cover"  style=" max-height: 350px;" alt="Hero Background">
    <div class="position-absolute top-50 start-50 translate-middle text-center w-75 text-white fw-bold fs-2" >
      Know a service provider we should add?</div>
      <div class="position-absolute bottom-0 end-0 text-white-50 fst-italic small pe-3 pb-2 user-select-none fs-7" >
        Photo by Toa Heftiba on <a href="https://unsplash.com" target="_blank" class="text-white-50 text-decoration-underline">Unsplash</a>
      </div>
    </div>
  </div>
</div>

<div class="jumbotron page-tag rounded-bottom z-3 position-relative dark_navy align-items-center justify-content-start py-3 px-4">
  <h1 class="fw-bold white m-0">Registration Form</h1>
  <nav aria-label="breadcrumb" class="position-absolute top-0 end-0 me-3 mt-2 breadcrumb-top-right">
  <ol class="breadcrumb mb-0">
    <li class="breadcrumb-item"><a href="/../Gov-AI/index.html" class="text-white">Home</a></li>
    <li class="text-white mx-2">›</li> 
    <li class="breadcrumb-item active text-white" aria-current="page">Referral form</li>
  </ol>
</nav>
</div>

<main class="container-referral page w-50">
  <p>Share their details below, and we'll contact them.</p>

  <form novalidate>
  <div class="mb-3">
    <label for="firstName" class="fw-semibold dark-navy required">First Name</label>
    <input type="text" id="firstName" name="firstName" class="form-control border-2 rounded p-2 px-3" required aria-required="true" />
  </div>

  <div class="mb-3">
    <label for="lastName" class="fw-semibold dark-navy required">Last Name </label>
    <input type="text" id="lastName" name="lastName" class="form-control border-2 rounded p-2 px-3" required aria-required="true" />
  </div>

  <div class="mb-3">
    <label for="email" class="fw-semibold dark-navy required">Email </label>
    <input type="email" id="email" name="email" class="form-control border-2 rounded p-2 px-3" required aria-required="true" />
  </div>

  <div class="mb-3">
    <label for="phone" class="fw-semibold dark-navy required">Phone Number</label>
    <input type="tel" id="phone" name="phone" class="form-control border-2 rounded p-2 px-3" required aria-required="true" />
  </div>

  <div class="mb-3">
    <label for="organization" class="fw-semibold dark-navy required">Organization</label>
    <input type="text" id="organization" name="organization" class="form-control border-2 rounded p-2 px-3" required aria-required="true">
  </div>

  <div class="mb-3">
    <label for="contactInfo" class="fw-semibold dark-navy required">Contact Info</label>
    <input type="text" id="contactInfo" name="contactInfo" class="form-control border-2 rounded p-2 px-3" required aria-required="true">
  </div>

  <div class="mb-3">
    <label for="message" class="fw-semibold dark-navy">Message</label>
    <textarea id="message" rows="4" class="form-control border-2 rounded p-2 px-3" placeholder="Enter the provider name and contact info that you are wanting to refer"></textarea>
  </div>

  <div class="d-flex gap-3 mt-3">
    <button type="submit" class="submit-btn text-white py-2 px-3 fw-bold fs-5 rounded">Next</button>
  </div>
</form>
</main>                 
<div id="footer"></div>

    <script>
        fetch('../../partials/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);
        fetch('../../partials/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert/dist/sweetalert.min.js"></script>
    <script src="/Gov-AI/js/referral_form.js"></script>
</body>
</html>
