<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css"/>
  <title>Service Referral Form</title>
  <link rel="icon" type="image" href="/assets/images/cropped-Seal_JPEG-32x32.jpg">
</head>
<div id="navbar" data-name="Navigation Bar"></div>
<body class="white">
      <div id="carouselExampleControls" class="carousel slide carousel-fade" data-bs-ride="carousel" data-name="Banner Carousel">
            <div class="position-relative overflow-hidden" style="max-height: 350px;" data-name="Banner Image Container">
                <div class="carousel-item active" data-name="Banner Slide">
                    <img src="..\..\assets\images\referral-form.png" class="w-100 h-100 object-fit-cover"  style=" max-height: 350px;" alt="Hero Background" data-name="Banner Image">
    <div class="position-absolute top-50 start-50 translate-middle text-center w-75 text-white fw-bold fs-2" data-name="Banner Text Overlay">
      Know a service provider we should add?</div>
      <div class="position-absolute bottom-0 end-0 text-white-50 fst-italic small pe-3 pb-2 user-select-none fs-7" data-name="Photo Attribution">
        Photo by Toa Heftiba on <a href="https://unsplash.com" target="_blank" class="text-white-50 text-decoration-underline" data-name="Photo Source Link">Unsplash</a>
      </div>
    </div>
  </div>
</div>
  <div class="overflow-visible" data-name="Page Header Section">
  <div class="p-4 dark_navy d-flex align-items-center justify-content-start position-relative" data-name="Page Header Bar">
    <h1 class="ps-5 fw-bold white" data-name="Page Title">Referral Form</h1>
  <nav aria-label="breadcrumb" class="position-absolute top-0 end-0 me-3 mt-2 breadcrumb-top-right" data-name="Navigation Breadcrumb">
  <ol class="breadcrumb mb-0" data-name="Breadcrumb Links">
    <li class="breadcrumb-item fs-6" data-name="Breadcrumb Home Link"><a href="/../Gov-AI/index.html" class="text-white">Home</a></li>
    <li class="text-white mx-2 fs-6" data-name="Breadcrumb Separator">›</li> 
    <li class="breadcrumb-item active text-white fs-6" aria-current="page" data-name="Current Page in Breadcrumb">Referral form</li>
  </ol>
</nav>
</div>
</div>

 <main class="container-fluid px-4 px-md-5" data-name="Referral Form Main Content">
    <div class="row justify-content-left" data-name="Form Container Row">
      <div class="col-12 col-lg-6 px-3 px-lg-4" data-name="Form Input Column">
        <p class="mb-4" data-name="Form Introduction Text">Share their details below, and we'll contact them.</p>

  <form novalidate data-name="Service Referral Form">
  <div class="mb-3" data-name="Referrer's First Name Section">
    <label for="firstName" class="fw-semibold dark-navy required">First Name</label>
    <input type="text" id="firstName" name="firstName" class="form-control border-2 rounded p-2 px-3" required aria-required="true" data-name="Referrer's First Name Input" />
  </div>

  <div class="mb-3" data-name="Referrer's Last Name Section">
    <label for="lastName" class="fw-semibold dark-navy required">Last Name </label>
    <input type="text" id="lastName" name="lastName" class="form-control border-2 rounded p-2 px-3" required aria-required="true" data-name="Referrer's Last Name Input" />
  </div>

  <div class="mb-3" data-name="Referrer's Email Section">
    <label for="email" class="fw-semibold dark-navy required">Email </label>
    <input type="email" id="email" name="email" class="form-control border-2 rounded p-2 px-3" required aria-required="true" data-name="Referrer's Email Input" />
  </div>

  <div class="mb-3" data-name="Referrer's Phone Number Section">
    <label for="phone" class="fw-semibold dark-navy required">Phone Number</label>
    <input type="tel" id="phone" name="phone" class="form-control border-2 rounded p-2 px-3" required aria-required="true" data-name="Referrer's Phone Number Input" />
  </div>
  
  <div class="mb-3" data-name="Service Provider Details Section">
    <label for="message" class="fw-semibold dark-navy">Message</label>
    <textarea id="message" rows="4" class="form-control border-2 rounded p-2 px-3" placeholder="Enter the provider name and contact info that you are wanting to refer" data-name="Service Provider Information Input"></textarea>
  </div>

  <div class="d-flex gap-3 mt-3" data-name="Form Action Buttons">
    <button type="submit" class="submit-btn " data-name="Submit Referral Button">Next</button>
  </div>
</form>
</main>                 
<div id="footer" data-name="Page Footer"></div>

    <script>
        fetch('../../partials/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);
        fetch('../../partials/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert/dist/sweetalert.min.js"></script>
    <script src="/Gov-AI/js/referral_form.js"></script>
    <script src="../../js/analytics.js"></script>
</body>
</html>
