<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC Assist</title>
    <link rel="icon" type="image" href="../../assets/images/cropped-Seal_JPEG-32x32.jpg">
    <!-- bootstrap library and custom css link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div id="navbar" data-name="Navigation Bar"></div>
    
<main class="info-page" data-name="AI Results Main Content">
    <div id="divService" class="px-5 info-print" data-name="AI Results Page Container">
        <div class="d-flex align-items-center justify-content-end mb-5 info-hidden" data-name="Top Action Buttons">
              <div id="btnPrintAIResults" data-name="Print Results Button">
                  <a href="#btnPrintPage" class="btn btn-link mt-5 text-dark text-decoration-none" data-name="Print Page Link">
                      <i class="bi bi-printer-fill " data-name="Print Icon"></i>
                      Print Page
                  </a>
              </div>
          </div>
          <div class="service-header">
            <h2 id="txtHeader" class="mb-5" data-name="Results Introduction Text">
                Based on what you told us, here are three recommended resources...
            </h2>
          </div>
            <!-- AI suggestions -->
          <div id="suggestedResources" class="" data-name="Recommended Resources List"></div>
        
        </div>
    </main>

    <div id="footer" data-name="Page Footer"></div>

    <script>
        fetch('../../partials/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);
        fetch('../../partials/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);
    </script>
    <!-- more bootsrap libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../../js/api.js"></script>
    <script  src="../../js/navbar.js"></script>
    <script type="module" src="/js/ai_results.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../js/analytics.js"></script>
</body>
</html>
