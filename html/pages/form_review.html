<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css"/>
  <title>Service Referral Form</title>
  <link rel="icon" type="image" href="../../assets/images/cropped-Seal_JPEG-32x32.jpg">
</head>
<body class="white">
  <div id="navbar"></div>
  <main>
    <div class="overflow-visible ontainer row">
        <!-- old information -->
        <div id="formReviewOldInformation" class="col p-5">
            <h2 class="mb-4 fw-bold">Previous Information</h2>

            <!-- ORGANIZATION PUBLIC -->
            <h4 class="fw-light">Organization Information (Public)</h4>
            <input class="form-control mb-2" placeholder="Company Name" data-name="Company Name Input">
            <textarea class="form-control mb-2" placeholder="Organization Description" data-name="Organization Description Input"></textarea>
            <input class="form-control mb-2" id="phone" placeholder="Phone">
            <input class="form-control mb-2" id="website" placeholder="Website">
            <input class="form-control mb-2" id="physicalAddress" placeholder="Address">
            <input class="form-control mb-2" id="cityPublic" placeholder="City">
            <input class="form-control mb-2" id="statePublic" placeholder="State">
            <input class="form-control mb-2" id="zipPublic" placeholder="Zip">
            <input class="form-control mb-2" placeholder="Keywords (comma separated)" id="orgKeywords">
            <textarea class="form-control mb-3" placeholder="Hours of Operation" id="orgHours"></textarea>
            <input type="file" class="form-control mb-4" id="upload">

            <!-- PRIMARY CONTACT -->
            <h4 class="fw-light">Primary Contact</h4>
            <input class="form-control mb-2" id="primaryName" placeholder="Name">
            <input class="form-control mb-2" id="primaryEmail" placeholder="Email">
            <input class="form-control mb-2" id="primaryPhone" placeholder="Phone">
            <input class="form-control mb-4" id="primaryPosition" placeholder="Position">
            <!-- SECONDARY CONTACT -->
            <h4 class="fw-light">Secondary Contact</h4>
            <input class="form-control mb-2" id="secondaryName" placeholder="Name">
            <input class="form-control mb-2" id="secondaryEmail" placeholder="Email">
            <input class="form-control mb-2" id="secondaryPhone" placeholder="Phone">
            <input class="form-control mb-4" id="secondaryPosition" placeholder="Position">

            <!-- SERVICE -->
            <h4 class="fw-light">Service</h4>
            <input class="form-control mb-2" id="serviceName" placeholder="Service Name">
            <textarea class="form-control mb-2" id="serviceDescription" placeholder="Service Description"></textarea>
            <input class="form-control mb-2" id="serviceCriteria" placeholder="Criteria">
            <input class="form-control mb-2" id="serviceCounties" placeholder="Counties (comma separated)">
            <input class="form-control mb-2" id="serviceKeywords" placeholder="Keywords (comma separated)">
            <input class="form-control mb-2" id="servicePhone1" placeholder="Service Phone">
            <input class="form-control mb-2" id="serviceAddressStreet1" placeholder="Service Address">
            <input class="form-control mb-2" id="serviceCity1" placeholder="City">
            <input class="form-control mb-2" id="serviceState1" placeholder="State">
            <input class="form-control mb-2" id="serviceZip1" placeholder="Zip">
            <textarea class="form-control mb-4" id="serviceHours" placeholder="Service Hours"></textarea>
        </div>
        <!-- new information -->
        <div id="formReviewNewInformation" class="col  p-5">
            <h2 class="mb-4 fw-bold">Updated Information</h2>

            <!-- ORGANIZATION PUBLIC -->
            <h4 class="fw-light">Organization Information (Public)</h4>
            <input class="form-control mb-2" placeholder="Company Name" data-name="Company Name Input">
            <textarea class="form-control mb-2" placeholder="Organization Description" data-name="Organization Description Input"></textarea>
            <input class="form-control mb-2" id="phone" placeholder="Phone">
            <input class="form-control mb-2" id="website" placeholder="Website">
            <input class="form-control mb-2" id="physicalAddress" placeholder="Address">
            <input class="form-control mb-2" id="cityPublic" placeholder="City">
            <input class="form-control mb-2" id="statePublic" placeholder="State">
            <input class="form-control mb-2" id="zipPublic" placeholder="Zip">
            <input class="form-control mb-2" placeholder="Keywords (comma separated)" id="orgKeywords">
            <textarea class="form-control mb-3" placeholder="Hours of Operation" id="orgHours"></textarea>
            <input type="file" class="form-control mb-4" id="upload">

            <!-- PRIMARY CONTACT -->
            <h4 class="fw-light">Primary Contact</h4>
            <input class="form-control mb-2" id="primaryName" placeholder="Name">
            <input class="form-control mb-2" id="primaryEmail" placeholder="Email">
            <input class="form-control mb-2" id="primaryPhone" placeholder="Phone">
            <input class="form-control mb-4" id="primaryPosition" placeholder="Position">
            <!-- SECONDARY CONTACT -->
            <h4 class="fw-light">Secondary Contact</h4>
            <input class="form-control mb-2" id="secondaryName" placeholder="Name">
            <input class="form-control mb-2" id="secondaryEmail" placeholder="Email">
            <input class="form-control mb-2" id="secondaryPhone" placeholder="Phone">
            <input class="form-control mb-4" id="secondaryPosition" placeholder="Position">

            <!-- SERVICE -->
            <h4 class="fw-light">Service</h4>
            <input class="form-control mb-2" id="serviceName" placeholder="Service Name">
            <textarea class="form-control mb-2" id="serviceDescription" placeholder="Service Description"></textarea>
            <input class="form-control mb-2" id="serviceCriteria" placeholder="Criteria">
            <input class="form-control mb-2" id="serviceCounties" placeholder="Counties (comma separated)">
            <input class="form-control mb-2" id="serviceKeywords" placeholder="Keywords (comma separated)">
            <input class="form-control mb-2" id="servicePhone1" placeholder="Service Phone">
            <input class="form-control mb-2" id="serviceAddressStreet1" placeholder="Service Address">
            <input class="form-control mb-2" id="serviceCity1" placeholder="City">
            <input class="form-control mb-2" id="serviceState1" placeholder="State">
            <input class="form-control mb-2" id="serviceZip1" placeholder="Zip">
            <textarea class="form-control mb-4" id="serviceHours" placeholder="Service Hours"></textarea>

            <!-- BUTTON -->
            <button class="btn submit-btn" onclick="logFormData()">Update Information</button>
        </div>

    </div>
</main>                 
<div id="footer" data-name="Page Footer"></div>

    <script>
        fetch('../../partials/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data);
        fetch('../../partials/navbar.html')
            .then(response => response.text())
            .then(data => document.getElementById('navbar').innerHTML = data);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert/dist/sweetalert.min.js"></script>
    <script src="/js/referral_form.js"></script>
    <script src="../../js/analytics.js"></script>
    <script src="../../js/navbar.js"></script>
</body>
</html>
