<div id="carouselExampleIndicators" class="carousel slide position-relative" data-bs-ride="carousel">
    <div class="carousel-inner">
        <!-- ALL of the photos with captions-->
        <div class="carousel-item active">
            <img class="responsive-header d-inline-flex position-relative vw-100 landing-img-height" src="assets/images/carousel/burgess-falls.png" alt="First slide">
            <div class="carousel-caption d-none d-md-block text-end fw-light">
                <h5>Burgess Falls</h5>
            </div>
        </div>    
        <div class="carousel-item">
            <img class="responsive-header d-inline-flex position-relative vw-100 landing-img-height" src="assets/images/carousel/cannon-county.svg" alt="First slide">
            <div class="carousel-caption d-none d-md-block text-end fw-light">
                <h5>Cannon County</h5>
            </div>
        </div>
        <div class="carousel-item">
            <img class="responsive-header d-inline-flex position-relative vw-100 landing-img-height" src="assets/images/carousel/clay-county.svg" alt="First slide">
            <div class="carousel-caption d-none d-md-block text-end fw-light">
                <h5>Clay County</h5>
            </div>
        </div>
        <div class="carousel-item">
            <img class="responsive-header d-inline-flex position-relative vw-100 landing-img-height" src="assets/images/carousel/falls-creek.svg" alt="First slide">
            <div class="carousel-caption d-none d-md-block text-end fw-light">
                <h5>Falls Creek Falls Tennessee State Park</h5>
            </div>
        </div>
        <div class="carousel-item">
            <img class="responsive-header d-inline-flex position-relative vw-100 landing-img-height" src="assets/images/carousel/fentress-county.svg" alt="First slide">
            <div class="carousel-caption d-none d-md-block text-end fw-light">
                <h5>Fentress County</h5>
            </div>
        </div>
        <div class="carousel-item">
            <img class="responsive-header d-inline-flex position-relative vw-100 landing-img-height" src="assets/images/carousel/twin-falls.svg" alt="First slide">
            <div class="carousel-caption d-none d-md-block text-end fw-light">
                <h5>Twin Falls, Rock Island State Park</h5>
            </div>
        </div>
        </div>

        <!-- text above photos -->
        <div class="carousel-caption d-flex flex-column align-items-center justify-content-center h-100 col-11 col-md-9 col-lg-7 mx-auto start-0 end-0">
        <h1 class="display-3 fw-bolder mb-4">Assisting You in Finding the Right Help</h1>
        
        <!-- search bar section -->
        <div class="ai-search-bar mt-md-3 mt-lg-5 d-flex align-items-center">
            <i class="bi bi-search ps-2"></i>
            <div class="divider-vertical d-flex align-items-center"></div>
            <input
                id="txtAIPrompt"
                class="form-control flex-grow-1 border-0 shadow-none p-0 w-100 align-self-center search-input"
                type="text"
                placeholder="What are you looking for?" 
                aria-label="What are you looking for?"> <!-- TODO: Placeholder change based on screen size -->
            <!-- <button class="btn search-btn fs-3" aria-label="Dropdown"><i class="bi bi-caret-down-fill"></i></span> -->
            <button
                id="btn-AI-search"
                type="button"
                class="btn search-btn fs-3"
                aria-label="Submit">
                <i class="bi bi-arrow-right-circle-fill mt-2"></i>
            </button>
        </div>
    </div>
</div>
