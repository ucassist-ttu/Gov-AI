        <!-- text above photos -->
        <div class="carousel-caption d-flex flex-column align-items-center justify-content-center h-100 col-11 col-md-9 col-lg-7 mx-auto start-0 end-0" data-name="Homepage Search Overlay">
        <h1 class="display-3 fw-bolder mb-4" data-name="Homepage Main Heading">Assisting You in Finding the Right Help</h1>
        
        <!-- search bar section -->
         <div class="d-flex mt-md-3 mt-lg-5 align-items-center" data-name="Homepage Search Section">
            <div class="ai-search-bar d-flex align-items-center" data-name="AI-Powered Search Bar">
                <i class="bi bi-search ps-2" data-name="Search Icon"></i>
                <div class="divider-vertical d-flex align-items-center" data-name="Search Bar Divider"></div>
                <input
                    id="txtAIPrompt"
                    class="form-control flex-grow-1 border-0 shadow-none p-0 w-100 align-self-center search-input"
                    type="text"
                    placeholder="What are you looking for?" 
                    aria-label="What are you looking for?" data-name="Search Input Field"> <!-- TODO: Placeholder change based on screen size -->

                    id="btn-AI-search"
                    type="button"
                    class="btn search-btn fs-3"
                    aria-label="Submit" data-name="AI Search Submit Button">
                    <i class="bi bi-arrow-right-circle-fill mt-2" data-name="Submit Arrow Icon"></i>
                </button>
            </div>
             <button id="btnLearnSearchBar" class="btn btn-link p-3" style="border: none; font-size: 25px;" data-name="Search Help Button"><i class="bi bi-question-circle" style="color: white;" data-name="Help Question Icon"></i></button>
        </div>
    </div>
</div>
